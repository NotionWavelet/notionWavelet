<!DOCTYPE html>
<html lang="es">
<head>
<title>Contacto y Soporte - Noción de Ondícula</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" type="text/css" href="styles/bootstrap4/bootstrap.min.css">
<link rel="stylesheet" type="text/css" href="styles/contact.css">
<link rel="stylesheet" type="text/css" href="styles/footer.css">
<link rel="stylesheet" type="text/css" href="styles/navbar.css">
</head>
<body>

<div class="super_container">
    <header class="header"><div id="navbar_container"></div></header>

    <div class="contact" style="padding-top: 140px; padding-bottom: 60px;">
        <div class="container">
            <div class="row">
                <div class="col-lg-6">
                    <div class="review_form_container">
                        <div class="review_form_title" style="font-size: 2rem; font-weight: 700; margin-bottom: 10px;">Soporte Técnico</div>
                        <!-- CAMBIO CLAVE: action directo a tu Formspree -->
                        <form action="https://formspree.io/f/mojgddly" method="POST" class="review_form">
                            <div class="d-flex flex-column gap-3">
                                <input type="text" name="nombre" class="review_form_input mb-3" placeholder="Nombre completo" required style="width:100%;">
                                <input type="email" name="email" class="review_form_input mb-3" placeholder="Correo electrónico" required style="width:100%;">
                                <input type="text" name="asunto" class="review_form_input mb-3" placeholder="Asunto" required style="width:100%;">
                            </div>
                            <textarea name="mensaje" class="review_form_text" placeholder="Escribe aquí tu consulta..." required style="margin-top: 10px;"></textarea>
                            <button type="submit" class="review_form_button" style="margin-top: 20px;">Enviar consulta</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer"><div id="footer_container"></div></footer>
</div>

<script src="js/navbar.js" defer></script>
<script src="js/footer.js" defer></script>
</body>
</html>
