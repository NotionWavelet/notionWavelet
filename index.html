<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Noción de Ondícula | Software Integral para Talleres</title>

    <!-- SEO SCHEMA -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Noción de Ondícula",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Windows 10, 11",
      "description": "Software de escritorio profesional para la gestión integral de talleres mecánicos."
    }
    </script>

    <!-- Estilos y Animaciones -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="plugins/OwlCarousel2-2.2.1/owl.carousel.css">
    <link rel="stylesheet" type="text/css" href="styles/navbar.css">
    <style>
        :root { --blue-pro: #0056b3; }
        .hero { padding: 180px 0 100px; background: #f8fafc; }
        .card-pro { padding: 30px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; }
    </style>
</head>
<body>

<header class="header"><div id="navbar_container"></div></header>

<div class="super_container">
    <!-- HERO -->
    <section class="hero text-center" data-aos="fade-up">
        <h1>Gestiona tu taller como un profesional</h1>
        <p class="lead">Software de escritorio: facturación, órdenes y stock.</p>
    </section>

    <!-- 3 MÓDULOS -->
    <section class="py-5" data-aos="fade-up">
        <div class="container"><div class="row">
            <div class="col-md-4"><div class="card-pro"><h5>Facturación</h5></div></div>
            <div class="col-md-4"><div class="card-pro"><h5>Órdenes</h5></div></div>
            <div class="col-md-4"><div class="card-pro"><h5>Recambios</h5></div></div>
        </div></div>
    </section>

    <!-- SECCIÓN SEGURIDAD Y TESTIMONIOS -->
    <section class="py-5" data-aos="fade-up" style="background: #f8fafc;">
        <div class="container"><div class="row">
            <div class="col-md-6">
                <h4><i class="fas fa-shield-alt text-primary"></i> Privacidad 100% Local</h4>
                <p>Tus datos nunca salen de tu taller. Sin cuotas de servidor.</p>
            </div>
            <div class="col-md-6">
                <h4><i class="fas fa-quote-left text-primary"></i> Lo que dicen los clientes</h4>
                <p>"La eficiencia del taller ha subido un 50%."</p>
            </div>
        </div></div>
    </section>

    <!-- CARRUSEL CON LAZY LOADING -->
    <section class="py-5" data-aos="fade-up">
        <div class="container">
            <div class="owl-carousel gallery_slider">
                <div class="item"><img src="images/gallery_1.jpg" loading="lazy"></div>
                <div class="item"><img src="images/gallery_2.jpg" loading="lazy"></div>
                <div class="item"><img src="images/gallery_3.jpg" loading="lazy"></div>
                <div class="item"><img src="images/gallery_4.jpg" loading="lazy"></div>
                <div class="item"><img src="images/gallery_5.jpg" loading="lazy"></div>
                <div class="item"><img src="images/gallery_6.jpg" loading="lazy"></div>
            </div>
        </div>
    </section>
</div>

<!-- SCRIPTS (Ordenados al final para no ralentizar) -->
<script src="js/jquery-3.2.1.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="plugins/OwlCarousel2-2.2.1/owl.carousel.js"></script>
<script>
    AOS.init(); // Inicia animaciones
    $('.gallery_slider').owlCarousel({loop:true, margin:20, items:3});
</script>
</body>
</html>
