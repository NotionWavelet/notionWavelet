<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Noción de Ondícula | Software Integral para Talleres</title>

    <!-- SEO SCHEMA -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Noción de Ondícula",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Windows 10, 11",
      "description": "Software de escritorio profesional para la gestión integral de talleres mecánicos."
    }
    </script>

    <!-- ESTILOS ORIGINALES (NO BORRAR ESTAS RUTAS) -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="plugins/OwlCarousel2-2.2.1/owl.carousel.css">
    <link rel="stylesheet" type="text/css" href="styles/notionwavelet.css">
    <link rel="stylesheet" type="text/css" href="styles/navbar.css">
    <link rel="stylesheet" type="text/css" href="styles/footer.css">
</head>
<body>

<div class="super_container">
    <!-- LA CABECERA (Asegúrate que el archivo js/navbar.js esté en tu carpeta js/) -->
    <header class="header"><div id="navbar_container"></div></header>

    <!-- HERO -->
    <section class="hero text-center" data-aos="fade-up">
        <div class="container">
            <h1>Gestiona tu taller como un profesional</h1>
            <p class="lead">Software de escritorio: facturación, órdenes y stock.</p>
        </div>
    </section>

    <!-- SECCIÓN CARRUSEL (Con botones controlados) -->
    <section class="py-5" data-aos="fade-up">
        <div class="container">
            <div class="owl-carousel gallery_slider owl-theme">
                <div class="item"><img src="images/gallery_1.jpg" loading="lazy"></div>
                <div class="item"><img src="images/gallery_2.jpg" loading="lazy"></div>
                <div class="item"><img src="images/gallery_3.jpg" loading="lazy"></div>
                <div class="item"><img src="images/gallery_4.jpg" loading="lazy"></div>
                <div class="item"><img src="images/gallery_5.jpg" loading="lazy"></div>
                <div class="item"><img src="images/gallery_6.jpg" loading="lazy"></div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer"><div id="footer_container"></div></footer>
</div>

<!-- SCRIPTS EN ORDEN -->
<script src="js/jquery-3.2.1.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="plugins/OwlCarousel2-2.2.1/owl.carousel.js"></script>

<script>
    AOS.init();
    $(document).ready(function(){
        // Carrusel limpio: 'nav: false' elimina los botones prev/next si no los quieres
        $('.gallery_slider').owlCarousel({
            loop:true,
            margin:20,
            items:3,
            nav: false,
            dots: true
        });
    });
</script>
</body>
</html>
